name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Initialize Flutter Project
      run: flutter create --org com.factory --project-name factory_manager .

    - name: Fix minSdkVersion for Firebase
      run: sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle

    - name: Install Dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: factory-manager-apk
        path: build/app/outputs/flutter-apk/app-release.apk
